<body>
	<div class="loading" style="background: #fff;">
		<div class="icon">
			<img src="img/loading.svg" alt="">
		</div>
		<style type="text/css">
			.loading {
				position: fixed;
				top: 0px;
				left: 0px;
				right: 0px;
				bottom: 0px;
				z-index: 1000;
			}
			.loading .icon {
				width: 100px;
				position: absolute;
				top: 0px;
				height: 100px;
				bottom: 0px;
				right: 0px;
				margin: auto;
				left: 0px;
			}

		</style>
	</div>
	<script type="text/javascript">
		$(".list-menus a").click(function(e){
			if($(this).parent().find("ul").length){
				e.preventDefault();
				$(this).parent().addClass("open");
				$(this).parent().siblings().removeClass("open");
			}
		});
	</script>
</body>
